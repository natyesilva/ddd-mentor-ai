services:
  postgres:
    image: postgres:16
    container_name: dddmentorai-postgres
    restart: always
    environment:
      POSTGRES_DB: dddmentorai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - dddmentorai_postgres_data:/var/lib/postgresql/data

volumes:
  dddmentorai_postgres_data:
